name: Nightly Backup

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Supabase CLI
        run: npm install -g supabase

      - run: bash scripts/backup-supabase.sh
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_OUTPUT_DIR: backups

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-backup
          path: backups/**/*.gz
          if-no-files-found: error

      - name: Upload backup to R2
        if: ${{ secrets.R2_ENDPOINT != '' && secrets.R2_BUCKET != '' && secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_SECRET_ACCESS_KEY != '' }}
        run: node scripts/upload-backup-to-r2.mjs $(find backups -name '*.gz' | head -n 1)
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
