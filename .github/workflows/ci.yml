name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run lint:types

      - run: npm test
