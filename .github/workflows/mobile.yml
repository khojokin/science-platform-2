name: Mobile

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile.yml"
  workflow_dispatch:

jobs:
  expo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - working-directory: apps/mobile
        run: npm install

      - working-directory: apps/mobile
        run: npm run typecheck
